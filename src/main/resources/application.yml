spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/omniexx}
    username: ${DB_USER:omniexx}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway übernimmt das Schema, Hibernate nur validieren
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

omniexx:
  discord:
    token: ${DISCORD_TOKEN}
  tick:
    # 6h = 21600000ms | Für Dev: TICK_INTERVAL_MS=60000
    interval-ms: ${TICK_INTERVAL_MS:21600000}
  admin:
    # Komma-getrennte Discord-IDs mit Admin-Rechten
    discord-ids: ${ADMIN_DISCORD_IDS:}
  channels:
    leaderboard: ${LEADERBOARD_CHANNEL_ID:}
    event-log:   ${EVENT_LOG_CHANNEL_ID:}
